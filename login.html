<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Novus AI Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-panel {
            width: 100%;
            max-width: 480px;
            animation: slideUpFade 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header .logo-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
        }
        .auth-header h1 {
            font-family: var(--font-heading);
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin: 2rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-divider:not(:empty)::before { margin-right: 1em; }
        .auth-divider:not(:empty)::after { margin-left: 1em; }
        
        .btn-oauth {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            width: 100%;
            border-radius: 12px;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }
        .btn-oauth:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="login-panel glass-panel">
        <header class="auth-header">
            <i data-lucide="shield-check" class="logo-icon"></i>
            <h1>Secure Portal</h1>
            <p>Enter your credentials to access the Novus AI Agent</p>
        </header>

        <form id="login-form">
            <div class="input-group">
                <label for="email"><i data-lucide="mail"></i> Email or Username</label>
                <input type="text" id="email" placeholder="admin" required>
            </div>
            
            <div class="input-group">
                <label style="display: flex; justify-content: space-between;">
                    Encryption Key
                    <a href="#" style="color: var(--accent-blue); text-decoration: none; font-size: 0.8rem;">Override Protocol?</a>
                </label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                <i data-lucide="log-in"></i> Authenticate
            </button>
        </form>

        <div class="auth-divider">Neural Bypass</div>

        <button class="btn-oauth">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google Identity
        </button>

    </main>

    <script>
        lucide.createIcons();
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const btn = e.target.querySelector('button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="spin"></i> Verifying...';
            lucide.createIcons();

            try {
                // If it fails to login, it tries to register (simplified flow for demo purposes)
                let res = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) {
                    res = await fetch('http://localhost:3000/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                }

                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('novusUserId', data.userId);
                    localStorage.setItem('novusEmail', email);
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || "Authentication failed.");
                    btn.innerHTML = originalHTML;
                    lucide.createIcons();
                }
            } catch (err) {
                alert("Cannot reach backend server.");
                btn.innerHTML = originalHTML;
                lucide.createIcons();
            }
        });

        document.querySelector('.btn-oauth').addEventListener('click', () => {
             alert('Google OAuth mapping requires production redirect URIs. Please use email for now.');
        });
    </script>
</body>
</html>
