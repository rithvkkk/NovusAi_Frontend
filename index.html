<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Novus AI | Agent Portal</title>
  <meta name="description" content="AI-powered analysis and recommendations for Google Ads, Meta Ads, and SEO.">
  <link rel="icon" type="image/png" href="logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="agent-body">

<!-- ============ DASHBOARD ============ -->
<div class="dashboard-wrap active" id="dashboard">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="brand" style="font-size: 1.2rem;">NOVUS AI</span>
      <span class="sep">|</span>
      <span class="portal-label">Performance Specialist</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">
        <div class="avatar" id="userAvatar">A</div>
        <span id="userName">Admin</span>
      </div>
      <button class="btn-logout" id="logoutBtn" onclick="window.location.reload()">
        <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;margin-right:4px;">logout</span>Reset
      </button>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="ads">
      <span class="material-symbols-outlined tab-icon">campaign</span>Media Buyer AI
    </button>
    <button class="tab-btn" data-tab="seo">
      <span class="material-symbols-outlined tab-icon">travel_explore</span>SEO / CRO Architect
    </button>
    <button class="tab-btn" data-tab="social">
      <span class="material-symbols-outlined tab-icon">smartphone</span>Social Velocity
    </button>
    <button class="tab-btn" data-tab="email">
      <span class="material-symbols-outlined tab-icon">mail</span>Retention Analyst
    </button>
  </div>

  <!-- ======== TAB 1: MEDIA BUYER ======== -->
  <div class="tab-panel active" id="panel-ads">
    <div class="input-area">
      <label>Upload Ads Dashboard Screenshots for analysis</label>
      <div class="upload-zone" id="uploadZone">
        <span class="material-symbols-outlined upload-icon">cloud_upload</span>
        <p>Drag & drop screenshots here, or <strong style="color:var(--blue-light)">click to browse</strong></p>
        <p class="upload-hint">Accepts PNG, JPG, WEBP</p>
        <input type="file" id="fileInput" accept="image/*" hidden/>
      </div>
      <div class="upload-previews" id="uploadPreviews"></div>
      
      <div class="input-row" style="margin-top: 1rem;">
        <input type="text" class="input-field" id="adsUrl" placeholder="Optional: Target landing page URL"/>
        <button class="analyze-btn" id="analyze-ads" onclick="runAnalysis('ads')">
          <div class="spinner"></div>
          <span class="btn-text"><span class="material-symbols-outlined" style="font-size:16px">auto_awesome</span> Analyze</span>
        </button>
      </div>
    </div>

    <!-- Results injected dynamically -->
    <div class="results-area" id="results-ads"></div>
  </div>

  <!-- ======== TAB 2: SEO / CRO ======== -->
  <div class="tab-panel" id="panel-seo">
    <div class="input-area">
      <label>Enter URL for deep technical crawl</label>
      <div class="input-row">
        <input type="text" class="input-field" id="seoUrl" placeholder="https://example.com"/>
        <button class="analyze-btn" id="analyze-seo" onclick="runAnalysis('seo')">
          <div class="spinner"></div>
          <span class="btn-text"><span class="material-symbols-outlined" style="font-size:16px">auto_awesome</span> Analyze</span>
        </button>
      </div>
    </div>
    <div class="results-area" id="results-seo"></div>
  </div>

  <!-- ======== TAB 3: SOCIAL VELOCITY ======== -->
  <div class="tab-panel" id="panel-social">
    <div class="input-area">
      <label>Enter Social Handles for momentum analysis</label>
      <div class="input-row">
        <input type="text" class="input-field" id="igHandle" placeholder="Instagram Handle (e.g. @glamluxe)"/>
        <input type="text" class="input-field" id="ttHandle" placeholder="TikTok Handle"/>
        <button class="analyze-btn" id="analyze-social" onclick="runAnalysis('social')">
          <div class="spinner"></div>
          <span class="btn-text"><span class="material-symbols-outlined" style="font-size:16px">auto_awesome</span> Analyze</span>
        </button>
      </div>
    </div>
    <div class="results-area" id="results-social"></div>
  </div>

  <!-- ======== TAB 4: RETENTION ======== -->
  <div class="tab-panel" id="panel-email">
    <div class="input-area">
      <label>Provide Email List Parameters</label>
      <div class="input-row">
        <input type="number" class="input-field" id="listSize" placeholder="Total List Size (e.g. 50000)"/>
        <input type="text" class="input-field" id="automationStatus" placeholder="Flow Status (e.g. Basic flows active)"/>
        <button class="analyze-btn" id="analyze-email" onclick="runAnalysis('email')">
          <div class="spinner"></div>
          <span class="btn-text"><span class="material-symbols-outlined" style="font-size:16px">auto_awesome</span> Analyze</span>
        </button>
      </div>
    </div>
    <div class="results-area" id="results-email"></div>
  </div>

</div><!-- /dashboard-wrap -->

<!-- RAG Loading Indicator (Reused from Novus Devv) -->
<div class="rag-badge" id="ragBadge">
  <span class="material-symbols-outlined">network_node</span>
  <span id="ragText">Connecting to neural core...</span>
</div>

<script src="app.js"></script>
</body>
</html>
